openapi: 3.1.1
info:
  title: Vercel Swag Store API
  version: 2.0.0
  description: |-
    A RESTful API for browsing the Vercel Swag Store catalog and managing shopping carts.

    ## Getting Started

    ### Base URL

    All endpoints are relative to the base URL of this deployment:

    ```
    https://vercel-swag-store-api.vercel.app/api
    ```

    ### Authentication

    This API is protected by Vercel Deployment Protection. You **must** include the bypass token in every request using the `x-vercel-protection-bypass` header.

    You will receive this token along with the API base URL when you begin the assignment. Without it, all requests will return a `403 Forbidden` response.

    ```ts
    const res = await fetch("https://vercel-swag-store-api.vercel.app/api/products", {
      headers: {
        "x-vercel-protection-bypass": "OykROcuULI6YJwAwk3VnWv4gMMbpAq6q",
      },
    });
    const data = await res.json();
    ```

    ### Quick Start

    **Step 1: Browse featured products**

    ```bash
    curl https://vercel-swag-store-api.vercel.app/api/products?featured=true \
      -H "x-vercel-protection-bypass: OykROcuULI6YJwAwk3VnWv4gMMbpAq6q"
    ```

    **Step 2: Get product details and stock**

    ```bash
    curl https://vercel-swag-store-api.vercel.app/api/products/black-crewneck-t-shirt \
      -H "x-vercel-protection-bypass: OykROcuULI6YJwAwk3VnWv4gMMbpAq6q"

    curl https://vercel-swag-store-api.vercel.app/api/products/black-crewneck-t-shirt/stock \
      -H "x-vercel-protection-bypass: OykROcuULI6YJwAwk3VnWv4gMMbpAq6q"
    ```

    **Step 3: Create a cart**

    ```bash
    curl -X POST https://vercel-swag-store-api.vercel.app/api/cart/create -v \
      -H "x-vercel-protection-bypass: OykROcuULI6YJwAwk3VnWv4gMMbpAq6q"
    # Look for the x-cart-token header in the response
    ```

    **Step 4: Add an item to the cart**

    ```bash
    curl -X POST https://vercel-swag-store-api.vercel.app/api/cart \
      -H "Content-Type: application/json" \
      -H "x-cart-token: <your-cart-token>" \
      -H "x-vercel-protection-bypass: OykROcuULI6YJwAwk3VnWv4gMMbpAq6q" \
      -d '{"productId": "tshirt_001", "quantity": 2}'
    ```

    **Step 5: View the cart**

    ```bash
    curl https://vercel-swag-store-api.vercel.app/api/cart \
      -H "x-cart-token: <your-cart-token>" \
      -H "x-vercel-protection-bypass: OykROcuULI6YJwAwk3VnWv4gMMbpAq6q"
    ```

    ### Cart Tokens

    Carts are identified by anonymous tokens. When you create a cart via `POST /api/cart/create`, the response includes an `x-cart-token` header. Store this token and include it in all subsequent cart requests as the `x-cart-token` header.

    Cart tokens expire after **24 hours** of inactivity.

    ### Response Format

    All responses follow a consistent envelope:

    **Success:**
    ```json
    {
      "success": true,
      "data": { ... },
      "meta": { "pagination": { ... } }
    }
    ```

    **Error:**
    ```json
    {
      "success": false,
      "error": {
        "code": "NOT_FOUND",
        "message": "Product with id 'xyz' not found"
      }
    }
    ```

    ### Prices

    All prices are in **cents** (USD). For example, `2800` represents `$28.00`.

    ### Error Codes

    | Code | HTTP Status | Description |
    |---|---|---|
    | `VALIDATION_ERROR` | 422 | Invalid request body or query parameters |
    | `BAD_REQUEST` | 400 | Missing required headers or malformed request |
    | `NOT_FOUND` | 404 | Resource not found |
    | `INTERNAL_SERVER_ERROR` | 500 | Unexpected server error |
servers:
  - url: https://vercel-swag-store-api.vercel.app/api
    description: Current deployment
security:
  - deploymentProtection: []
tags:
  - name: Products
    description: Browse and search the product catalog
  - name: Categories
    description: List product categories
  - name: Stock
    description: Real-time stock availability
  - name: Promotions
    description: Active promotional banners
  - name: Cart
    description: Manage shopping carts with anonymous tokens
  - name: Store
    description: Store configuration and settings
  - name: Health
    description: Service health checks
paths:
  /products:
    get:
      operationId: listProducts
      summary: List products
      description: Returns a paginated list of products. Supports filtering by
        category, search term, and featured status.
      tags:
        - Products
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number (starts at 1)
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Items per page (max 100)
        - name: category
          in: query
          schema:
            type: string
            enum:
              - bottles
              - cups
              - mugs
              - desk
              - stationery
              - accessories
              - bags
              - hats
              - t-shirts
              - hoodies
              - socks
              - tech
              - books
          description: Filter by category slug
        - name: search
          in: query
          schema:
            type: string
          description: Search products by name, description, or tags
        - name: featured
          in: query
          schema:
            type: string
            enum:
              - "true"
              - "false"
          description: Filter by featured status
      responses:
        "200":
          description: Paginated product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
              example:
                success: true
                data:
                  - id: tshirt_001
                    name: Black Crewneck T-Shirt
                    slug: black-crewneck-t-shirt
                    description: Plain black crewneck tee with a small solid white equilateral
                      triangle facing upward on the left chest...
                    price: 3000
                    currency: USD
                    category: t-shirts
                    images:
                      - https://i8qy5y6gxkdgdcv9.public.blob.vercel-storage.com/storefront/black-crewneck-t-shirt.png
                    featured: true
                    tags:
                      - black
                      - tee
                      - crewneck
                      - triangle
                    createdAt: 2026-02-10T16:00:00Z
                meta:
                  pagination:
                    page: 1
                    limit: 20
                    total: 31
                    totalPages: 2
                    hasNextPage: true
                    hasPreviousPage: false
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /products/{id}:
    get:
      operationId: getProduct
      summary: Get product details
      description: Returns a single product by its ID or slug.
      tags:
        - Products
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Product ID (e.g. tshirt_001) or slug (e.g. black-crewneck-t-shirt)
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /products/{id}/stock:
    get:
      operationId: getProductStock
      summary: Get real-time stock availability
      description: Returns the current stock level for a product. Stock levels are
        dynamic and may change on every request.
      tags:
        - Stock
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Product ID (e.g. tshirt_001) or slug (e.g. black-crewneck-t-shirt)
      responses:
        "200":
          description: Stock availability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockResponse"
              example:
                success: true
                data:
                  productId: tshirt_001
                  stock: 12
                  inStock: true
                  lowStock: false
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /categories:
    get:
      operationId: listCategories
      summary: List all categories
      description: Returns all product categories with their product counts.
      tags:
        - Categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"
              example:
                success: true
                data:
                  - slug: bottles
                    name: Bottles
                    productCount: 1
                  - slug: cups
                    name: Cups
                    productCount: 2
                  - slug: mugs
                    name: Mugs
                    productCount: 2
                  - slug: desk
                    name: Desk
                    productCount: 2
                  - slug: stationery
                    name: Stationery
                    productCount: 5
                  - slug: accessories
                    name: Accessories
                    productCount: 4
                  - slug: bags
                    name: Bags
                    productCount: 3
                  - slug: hats
                    name: Hats
                    productCount: 3
                  - slug: t-shirts
                    name: T Shirts
                    productCount: 1
                  - slug: hoodies
                    name: Hoodies
                    productCount: 1
                  - slug: socks
                    name: Socks
                    productCount: 1
                  - slug: tech
                    name: Tech
                    productCount: 2
                  - slug: books
                    name: Books
                    productCount: 1
  /promotions:
    get:
      operationId: getActivePromotion
      summary: Get active promotion
      description: Returns a randomly selected active promotional banner. May return a
        different promotion on each request.
      tags:
        - Promotions
      responses:
        "200":
          description: Active promotion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromotionResponse"
              example:
                success: true
                data:
                  id: promo_001
                  title: Summer Ship-a-thon
                  description: Get 20% off all t-shirts and hoodies. Use code at checkout.
                  discountPercent: 20
                  code: SHIPIT20
                  validFrom: 2025-06-01T00:00:00Z
                  validUntil: 2025-09-01T00:00:00Z
                  active: true
  /cart:
    get:
      operationId: getCart
      summary: Get cart contents
      description: Retrieves the full cart with product details and calculated totals.
        Requires the `x-cart-token` header.
      tags:
        - Cart
      parameters:
        - name: x-cart-token
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: The cart token received when creating a cart
      responses:
        "200":
          description: Cart with product details and totals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"
        "400":
          description: Missing x-cart-token header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Cart not found or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: addItemToCart
      summary: Add an item to a cart
      description: Adds a product to an existing cart. Requires the `x-cart-token`
        header and a JSON body with `productId` and `quantity`.
      tags:
        - Cart
      parameters:
        - name: x-cart-token
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: The cart token received when creating a cart via POST /cart/create
      requestBody:
        required: true
        description: The product and quantity to add to the cart.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddToCartRequest"
            example:
              productId: tshirt_001
              quantity: 2
      responses:
        "201":
          description: Item added to cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"
        "400":
          description: Bad request (missing header or invalid JSON)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Cart or product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /cart/create:
    post:
      operationId: createCart
      summary: Create a new cart
      description: Creates a new empty cart. The response includes the cart token in
        the `x-cart-token` response header. Store this token and include it in
        all subsequent cart requests.
      tags:
        - Cart
      responses:
        "201":
          description: New empty cart created
          headers:
            x-cart-token:
              description: The cart token to use for subsequent cart operations
              schema:
                type: string
                format: uuid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"
  /cart/{itemId}:
    patch:
      operationId: updateCartItem
      summary: Update item quantity
      description: Update the quantity of a specific item in the cart. Set quantity to
        0 to remove the item.
      tags:
        - Cart
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
          description: The product ID of the item to update (e.g. tshirt_001)
        - name: x-cart-token
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: The cart token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCartItemRequest"
            example:
              quantity: 3
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Cart or item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: removeCartItem
      summary: Remove item from cart
      description: Remove a specific item from the cart entirely.
      tags:
        - Cart
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
          description: The product ID of the item to remove (e.g. tshirt_001)
        - name: x-cart-token
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: The cart token
      responses:
        "200":
          description: Updated cart without the removed item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Cart or item not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /store/config:
    get:
      operationId: getStoreConfig
      summary: Get store configuration
      description: Returns store configuration including enabled features, social
        links, and SEO defaults.
      tags:
        - Store
      responses:
        "200":
          description: Store configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      storeName:
                        type: string
                        example: Vercel Swag Store
                      currency:
                        type: string
                        example: USD
                      features:
                        type: object
                        description: Feature flags indicating which store features are enabled.
                        properties:
                          wishlist:
                            type: boolean
                            example: true
                          productComparison:
                            type: boolean
                            example: true
                          reviews:
                            type: boolean
                            example: true
                          liveChat:
                            type: boolean
                            example: true
                          recentlyViewed:
                            type: boolean
                            example: true
                      socialLinks:
                        type: object
                        properties:
                          twitter:
                            type: string
                            format: uri
                            example: https://twitter.com/vercel
                          github:
                            type: string
                            format: uri
                            example: https://github.com/vercel
                          discord:
                            type: string
                            format: uri
                            example: https://discord.gg/vercel
                      seo:
                        type: object
                        properties:
                          defaultTitle:
                            type: string
                            example: Vercel Swag Store
                          titleTemplate:
                            type: string
                            example: "%s | Vercel Swag Store"
                          defaultDescription:
                            type: string
                            example: Official Vercel merchandise. Premium developer apparel, accessories,
                              and gear.
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      description: Returns the health status of the API and its dependent services (Redis).
      tags:
        - Health
      responses:
        "200":
          description: Service health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok
                      timestamp:
                        type: string
                        format: date-time
                        example: 2025-06-01T12:00:00Z
                      services:
                        type: object
                        properties:
                          redis:
                            type: string
                            enum:
                              - connected
                              - error
                            example: connected
components:
  securitySchemes:
    deploymentProtection:
      type: apiKey
      in: header
      name: x-vercel-protection-bypass
      description: Vercel Deployment Protection bypass token. Required on every request.
  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
          example: tshirt_001
        name:
          type: string
          example: Black Crewneck T-Shirt
        slug:
          type: string
          example: black-crewneck-t-shirt
        description:
          type: string
          example: Plain black crewneck tee with a small solid white equilateral triangle
            facing upward on the left chest...
        price:
          type: integer
          description: Price in cents
          example: 3000
        currency:
          type: string
          example: USD
        category:
          type: string
          example: t-shirts
        images:
          type: array
          items:
            type: string
            format: uri
        featured:
          type: boolean
          description: Whether this product is featured on the homepage
          example: true
        tags:
          type: array
          items:
            type: string
          example:
            - black
            - tee
            - crewneck
            - triangle
        createdAt:
          type: string
          format: date-time
          example: 2025-01-10T10:00:00Z
    StockInfo:
      type: object
      properties:
        productId:
          type: string
          example: tshirt_001
        stock:
          type: integer
          description: Current stock quantity (changes on every request)
          example: 12
        inStock:
          type: boolean
          example: true
        lowStock:
          type: boolean
          description: True when stock is between 1 and 5
          example: false
    Category:
      type: object
      properties:
        slug:
          type: string
          example: t-shirts
        name:
          type: string
          example: T Shirts
        productCount:
          type: integer
          example: 6
    Promotion:
      type: object
      properties:
        id:
          type: string
          example: promo_001
        title:
          type: string
          example: Summer Ship-a-thon
        description:
          type: string
          example: Get 20% off all t-shirts and hoodies. Use code at checkout.
        discountPercent:
          type: integer
          example: 20
        code:
          type: string
          example: SHIPIT20
        validFrom:
          type: string
          format: date-time
          example: 2025-06-01T00:00:00Z
        validUntil:
          type: string
          format: date-time
          example: 2025-09-01T00:00:00Z
        active:
          type: boolean
          example: true
    CartItemWithProduct:
      type: object
      properties:
        productId:
          type: string
          example: tshirt_001
        quantity:
          type: integer
          example: 2
        addedAt:
          type: string
          format: date-time
        product:
          $ref: "#/components/schemas/Product"
        lineTotal:
          type: integer
          description: price * quantity in cents
          example: 5600
    CartWithProducts:
      type: object
      properties:
        token:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItemWithProduct"
        totalItems:
          type: integer
          example: 2
        subtotal:
          type: integer
          description: Total in cents
          example: 5600
        currency:
          type: string
          example: USD
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 31
        totalPages:
          type: integer
          example: 2
        hasNextPage:
          type: boolean
          example: true
        hasPreviousPage:
          type: boolean
          example: false
    ProductListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        meta:
          type: object
          properties:
            pagination:
              $ref: "#/components/schemas/PaginationMeta"
    ProductResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/Product"
    StockResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/StockInfo"
    CategoryListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/Category"
    PromotionResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/Promotion"
    CartResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/CartWithProducts"
    AddToCartRequest:
      type: object
      required:
        - productId
      properties:
        productId:
          type: string
          example: tshirt_001
        quantity:
          type: integer
          minimum: 1
          default: 1
          example: 2
    UpdateCartItemRequest:
      type: object
      required:
        - quantity
      properties:
        quantity:
          type: integer
          minimum: 0
          description: Set to 0 to remove the item
          example: 3
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: NOT_FOUND
            message:
              type: string
              example: Product with id 'xyz' not found
            details:
              description: Additional error details (validation errors, etc.)
